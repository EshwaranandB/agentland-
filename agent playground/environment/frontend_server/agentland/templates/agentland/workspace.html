{% load static %}
<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AgentLand Workspace</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#fff;color:#202123;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}.workspace{height:100vh;display:grid;grid-template-columns:250px minmax(360px,1fr) minmax(460px,1.1fr);overflow:hidden}.sidebar{background:#202123;color:#ececf1;padding:14px;overflow:auto}.brand{font-weight:800;letter-spacing:.09em;margin:8px 8px 24px}.new-mission{display:block;width:100%;color:#fff;text-align:left;text-decoration:none;background:#343541;border:1px solid #565869;border-radius:8px;padding:11px 12px;margin-bottom:18px}.sidebar h2{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#a9a9b3;margin:20px 8px 9px}.session{display:block;color:#ececf1;text-decoration:none;padding:10px 9px;border-radius:7px;margin:2px 0}.session:hover,.session.current{background:#343541}.session strong{display:block;font-size:13px}.session small{color:#b7b7c2;font-size:11px}.conversation{display:flex;min-width:0;flex-direction:column;border-right:1px solid #e5e5e5}.conversation-header{padding:18px 22px;border-bottom:1px solid #eee;display:flex;gap:10px;align-items:center}.conversation-header h1{font-size:17px;margin:0;flex:1}.badge{font-size:11px;font-weight:700;border-radius:99px;padding:5px 8px;background:#e9f8ef;color:#17653a;white-space:nowrap}.messages{overflow:auto;flex:1;padding:24px 22px 150px}.message{display:grid;grid-template-columns:32px 1fr;gap:12px;padding:14px 0;border-bottom:1px solid #f0f0f0}.avatar{width:30px;height:30px;border-radius:6px;display:grid;place-items:center;background:#ececf1;font-size:13px;font-weight:800}.message.user .avatar{background:#202123;color:#fff}.message strong{display:block;font-size:13px;margin-bottom:4px}.message p{margin:0;line-height:1.48;font-size:14px}.evidence{margin-top:9px;border:1px solid #e2e2e2;background:#fafafa;border-radius:7px;padding:8px 10px;font:12px ui-monospace,Consolas,monospace;overflow-wrap:anywhere}.composer{border-top:1px solid #e5e5e5;padding:14px 18px;background:#fff}.composer textarea{width:100%;border:1px solid #d9d9e3;border-radius:9px;min-height:66px;padding:10px;font:inherit;resize:none}.compose-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}.compose-actions select,.compose-actions button{font:inherit;padding:7px 9px;border-radius:7px}.compose-actions select{border:1px solid #ddd}.compose-actions button{border:0;background:#202123;color:#fff;font-weight:700}.world{background:#f7f7f8;display:flex;min-width:0;flex-direction:column}.world-header{padding:17px 18px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;gap:10px}.world-header h2{font-size:15px;margin:0;flex:1}.hud{font-size:11px;color:#62626c}.world iframe{flex:1;width:100%;border:0;background:#111}.mobile-tabs{display:none}.notice{font-size:12px;color:#9b2c2c;margin-left:8px}.disclosure{font-size:12px;color:#666;margin:10px 0 0}@media(max-width:1000px){.workspace{grid-template-columns:210px 1fr}.world{grid-column:2}.conversation{grid-column:2}.workspace{height:auto;min-height:100vh}.world{height:600px}}@media(max-width:700px){.workspace{display:block;height:auto;overflow:visible}.sidebar{display:none}.mobile-tabs{display:flex;position:sticky;top:0;z-index:2;background:#202123;padding:8px;gap:7px}.mobile-tabs button{flex:1;border:0;border-radius:6px;background:#343541;color:#fff;padding:8px}.conversation,.world{height:calc(100vh - 48px);display:none;border:0}.conversation.active,.world.active{display:flex}.messages{padding-bottom:120px}}
</style></head><body>
<nav class="mobile-tabs"><button data-panel="conversation">Chat</button><button data-panel="world">World</button></nav>
<main class="workspace"><aside class="sidebar"><div class="brand">AGENTLAND</div><a class="new-mission" href="/agentland/">＋ New mission</a><h2>Sessions</h2><div id="session-list">Loading…</div></aside>
<section class="conversation active"><header class="conversation-header"><h1 id="title">AgentLand Mission</h1><span id="mode" class="badge">NOT DISPATCHED</span></header><div id="messages" class="messages"></div><form id="composer" class="composer"><textarea id="followup" placeholder="Ask AgentLand to build or verify something…" readonly aria-label="Mission follow-up"></textarea><div class="compose-actions"><span class="hud">This bounded demo accepts one implementation mission per session.</span><span><select id="runner"><option value="deterministic">Evidence Demo</option><option value="codex">Codex</option></select><button id="run-workflow" type="submit">Run workflow</button></span></div><p class="disclosure" id="disclosure"></p></form></section>
<section class="world"><header class="world-header"><h2>Live AgentLand World</h2><span id="world-hud" class="hud">Confirmed events only</span><span id="new-events" class="notice"></span></header><iframe id="city" title="AgentLand event-derived world"></iframe></section></main>
{{ session|json_script:"agentland-session" }}
<script>
const session=JSON.parse(document.getElementById('agentland-session').textContent),$=selector=>document.querySelector(selector),stopWords=new Set('a an the with and for to of in on my please app application project system feature bug fix build create make implement develop');let shownSequence=0,dispatching=false;
function titleFor(mission){const words=mission.toLowerCase().match(/[a-z0-9]+/g)||[];let chosen=words.filter(word=>!stopWords.has(word)).slice(0,6);if(/whiteboard/.test(mission))chosen=['collaborative','whiteboard'];if(/room.*isolation|isolation.*room/.test(mission)&&!/whiteboard/.test(mission))chosen=['room','isolation',/(verify|verification)/.test(mission)?'verification':'fix'];return chosen.length?chosen.map(word=>word[0].toUpperCase()+word.slice(1)).join(' '):'AgentLand Mission'}
function executionMode(data){const dispatch=(data.dispatches||[])[0];if(!dispatch)return'NOT DISPATCHED';if(dispatch.runner_identity==='deterministic')return'DETERMINISTIC DEMO';return dispatch.status==='blocked'?'CODEX BLOCKED':'REAL CODEX'}
function eventMessage(event){const payload=event.payload||{},type=event.type;if(type==='session.created')return['AgentLand','Mission created.'];if(type==='task.assigned')return['AgentLand',`${payload.assignee==='tester'?'Tester':'Builder'} was assigned: ${event.summary}`];if(type==='task.started')return['Builder','Builder started working inside Code Factory.'];if(type==='tool.started')return['Builder','Builder entered Code Factory.'];if(type==='file.modified')return['AgentLand',`Independently detected a modification to ${payload.path||'an allowed file'}.`];if(type==='file.created'||type==='file.deleted')return['AgentLand',event.summary];if(type==='tool.failed')return['AgentLand',`Codex could not start: ${payload.platform_error||payload.error_category||event.summary}`];if(type==='test.started')return['Tester','Tester started the fixed room-isolation verification.'];if(type==='test.passed')return['Tester','Verification passed.'];if(type==='test.failed')return['Tester','Verification failed.'];if(type==='artifact.created')return['AgentLand','A verified whiteboard artifact is available.'];if(type==='session.completed')return['AgentLand','Mission completed.'];return[(event.actor_id||'AgentLand').replace(/(^|_)(\w)/g,(_,a,b)=>b.toUpperCase()),event.summary]}
function evidenceFor(event){const payload=event.payload||{},values=[];if(payload.path)values.push(['File',payload.path]);if(payload.before_sha256)values.push(['Before',payload.before_sha256]);if(payload.after_sha256)values.push(['After',payload.after_sha256]);if(payload.runner_identity)values.push(['Runner',payload.runner_identity]);if(payload.command_id)values.push(['Test',payload.command_id]);if(payload.exit_code!==undefined&&payload.exit_code!==null)values.push(['Exit',payload.exit_code]);if(payload.duration_ms!==undefined&&payload.duration_ms!==null)values.push(['Duration',payload.duration_ms+' ms']);if(payload.platform_error)values.push(['Blocker',payload.platform_error]);return values}
function addMessage(author,text,kind='agent',evidence=[]){const row=document.createElement('article'),avatar=document.createElement('div'),body=document.createElement('div'),name=document.createElement('strong'),copy=document.createElement('p');row.className='message '+kind;avatar.className='avatar';avatar.textContent=kind==='user'?'You':author[0]||'A';name.textContent=author;copy.textContent=text;body.append(name,copy);if(evidence.length){const card=document.createElement('div');card.className='evidence';evidence.forEach(([key,value])=>{const line=document.createElement('div');line.textContent=`${key}: ${value}`;card.append(line)});body.append(card)}row.append(avatar,body);$('#messages').append(row)}
function render(data,scroll=false){$('#title').textContent=titleFor(data.mission);const mode=executionMode(data),canRun=!dispatching&&!(data.dispatches||[]).length;$('#mode').textContent=mode;$('#world-hud').textContent=`${data.status} · #${data.current_sequence} · ${mode}`;$('#runner').disabled=!canRun;$('#run-workflow').disabled=!canRun;$('#run-workflow').textContent=dispatching?'Starting…':canRun?'Run workflow':'Mission dispatched';$('#disclosure').textContent=mode==='DETERMINISTIC DEMO'?'Deterministic runner used to demonstrate AgentLand’s evidence pipeline.':mode==='CODEX BLOCKED'?'Codex was requested, but Windows denied process launch before Codex started.':'Only persisted, confirmed execution is shown.';const box=$('#messages');box.replaceChildren();addMessage('You',data.mission,'user');(data.events||[]).forEach(event=>{const [author,text]=eventMessage(event);addMessage(author,text,'agent',evidenceFor(event))});shownSequence=data.current_sequence;if(scroll)box.scrollTop=box.scrollHeight}
async function loadSessions(){const response=await fetch('/agentland/sessions/'),data=await response.json(),box=$('#session-list');box.replaceChildren();data.sessions.forEach(item=>{const link=document.createElement('a'),title=document.createElement('strong'),meta=document.createElement('small');link.href='/agentland/sessions/'+item.id+'/';link.className='session'+(item.id===session.id?' current':'');title.textContent=titleFor(item.mission);meta.textContent=`${item.status} · ${executionMode(item)} · #${item.current_sequence}`;link.append(title,meta);box.append(link)})}
async function poll(){try{const response=await fetch('/agentland/sessions/'+session.id+'/snapshot/');if(!response.ok)return;const data=await response.json();if(data.current_sequence!==shownSequence){render(data,shownSequence>0);$('#city').contentWindow.location.reload();}Object.assign(session,data)}catch(_error){}}
function startWorkflow(runner){if(dispatching||(session.dispatches||[]).length)return;dispatching=true;render(session);fetch('/agentland/sessions/'+session.id+'/dispatch-builder/',{method:'POST',headers:{'Content-Type':'application/json','Idempotency-Key':crypto.randomUUID()},body:JSON.stringify({runner_identity:runner})}).then(poll).finally(()=>{dispatching=false;poll()})}
function dispatchFromQuery(){const params=new URLSearchParams(location.search),runner=params.get('runner');if(!runner)return;history.replaceState({},'',location.pathname);startWorkflow(runner)}
$('#composer').onsubmit=event=>{event.preventDefault();startWorkflow($('#runner').value)};$('#city').src='/agentland/sessions/'+session.id+'/city/';render(session,true);loadSessions();dispatchFromQuery();setInterval(poll,750);document.querySelectorAll('.mobile-tabs button').forEach(button=>button.onclick=()=>{document.querySelectorAll('.conversation,.world').forEach(panel=>panel.classList.toggle('active',panel.classList.contains(button.dataset.panel)))});
</script></body></html>
