<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AgentLand</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f7f7f8;color:#202123;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif}.landing{min-height:100vh;display:grid;place-items:center;padding:28px}.chat{width:min(780px,100%)}.brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:.08em}.dot{width:13px;height:13px;border-radius:50%;background:#19a974}.intro{margin:70px 0 32px;text-align:center}.intro h1{font-size:clamp(32px,6vw,52px);margin:0 0 12px}.intro p{color:#616161;font-size:17px}.composer{border:1px solid #d6d6d6;border-radius:15px;background:#fff;box-shadow:0 7px 25px #0000000c;padding:12px}.composer textarea{width:100%;min-height:105px;border:0;resize:vertical;font:inherit;font-size:16px;outline:0}.actions{display:flex;align-items:center;gap:10px;border-top:1px solid #eee;padding-top:10px}.actions select,.actions button{font:inherit;border-radius:8px;padding:8px 11px}.actions select{border:1px solid #ddd;background:#fff}.actions button{margin-left:auto;border:0;background:#202123;color:#fff;font-weight:700;cursor:pointer}.note{min-height:22px;margin:10px 0 0;font-size:13px;color:#666}.error{color:#a42a2a}.sessions{margin-top:42px}.sessions h2{font-size:14px;color:#777;text-transform:uppercase;letter-spacing:.09em}.session-list{display:grid;gap:8px}.session{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1px solid #e6e6e6;border-radius:10px;text-decoration:none;color:inherit}.session:hover{border-color:#bbb}.session strong{flex:1}.badge{font-size:11px;padding:4px 6px;border-radius:99px;background:#e9f8ef;color:#17653a}.meta{font-size:12px;color:#777}@media(max-width:600px){.intro{margin-top:30px}.actions{flex-wrap:wrap}.actions button{width:100%;margin-left:0}}
</style></head><body><main class="landing"><section class="chat"><div class="brand"><span class="dot"></span>AGENTLAND</div><header class="intro"><h1>What should the agents build?</h1><p>Prompt a mission. Watch only confirmed work become a living world.</p></header><section class="composer"><textarea id="mission" placeholder="Ask AgentLand to build or verify something…">Repair whiteboard room isolation</textarea><div class="actions"><label>Runner <select id="runner"><option value="deterministic">Evidence Demo</option><option value="codex">Codex</option></select></label><span id="mode-note" class="meta">Deterministic runner demonstrates the evidence pipeline.</span><button id="send" type="button">Send mission ↑</button></div></section><p id="notice" class="note"></p><section class="sessions"><h2>Recent AgentLand sessions</h2><div id="sessions" class="session-list">Loading sessions…</div></section></section></main><script>
const $=s=>document.querySelector(s),stopWords=new Set('a an the with and for to of in on my please app application project system feature bug fix build create make implement develop');
function titleFor(mission){const words=mission.toLowerCase().match(/[a-z0-9]+/g)||[];const useful=words.filter(word=>!stopWords.has(word));let chosen=useful.slice(0,6);if(/whiteboard/.test(mission))chosen=['collaborative','whiteboard'];if(/room.*isolation|isolation.*room/.test(mission)&&!/whiteboard/.test(mission))chosen=['room','isolation',/(verify|verification)/.test(mission)?'verification':'fix'];return chosen.length?chosen.map(word=>word[0].toUpperCase()+word.slice(1)).join(' '):'AgentLand Mission'}
function mode(session){const dispatch=(session.dispatches||[])[0];if(!dispatch)return'NOT DISPATCHED';if(dispatch.runner_identity==='deterministic')return'DETERMINISTIC DEMO';return dispatch.status==='blocked'?'CODEX BLOCKED':'REAL CODEX'}
function notice(text,error=false){const node=$('#notice');node.textContent=text;node.className=error?'note error':'note'}
async function sessions(){const response=await fetch('/agentland/sessions/'),data=await response.json(),box=$('#sessions');box.replaceChildren();if(!data.sessions.length){box.textContent='No missions yet.';return}data.sessions.forEach(session=>{const link=document.createElement('a'),title=document.createElement('strong'),badge=document.createElement('span'),meta=document.createElement('span');link.className='session';link.href='/agentland/sessions/'+session.id+'/';title.textContent=titleFor(session.mission);badge.className='badge';badge.textContent=mode(session);meta.className='meta';meta.textContent=`${session.status} · #${session.current_sequence}`;link.append(title,badge,meta);box.append(link)})}
$('#runner').onchange=()=>$('#mode-note').textContent=$('#runner').value==='codex'?'Codex is requested with least privilege; Windows may block launch.':'Deterministic runner demonstrates the evidence pipeline.';
$('#send').onclick=async()=>{const mission=$('#mission').value.trim();if(!mission){notice('Write a mission first.',true);return}const runner=$('#runner').value;notice(`Creating ${titleFor(mission)}…`);const response=await fetch('/agentland/sessions/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mission})}),session=await response.json();if(!response.ok){notice(session.error||'Unable to create mission.',true);return}location.href='/agentland/sessions/'+session.id+'/?runner='+encodeURIComponent(runner)};sessions();
</script></body></html>
